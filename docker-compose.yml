version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: medcase-mysql
    environment:
      MYSQL_ROOT_PASSWORD: medcase123
      MYSQL_DATABASE: medcase_ai
      MYSQL_USER: medcase
      MYSQL_PASSWORD: medcase123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: medcase-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:medcase123@mysql:3306/medcase_ai?schema=public
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: medcase-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
